<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#f0fdf4"/>

  <!-- Green top bar -->
  <rect width="1200" height="6" fill="#16a34a"/>

  <!-- Right decoration block -->
  <rect x="780" y="0" width="420" height="630" fill="#dcfce7" opacity="0.5"/>
  <circle cx="1080" cy="200" r="220" fill="#bbf7d0" opacity="0.4"/>
  <circle cx="950" cy="480" r="160" fill="#86efac" opacity="0.25"/>

  <!-- Logo square -->
  <rect x="80" y="72" width="64" height="64" rx="14" fill="#16a34a"/>
  <!-- Chicken body (white) -->
  <path d="M112 84C106 84 103 88 103 92C103 96 105 98.5 107 100.5C103 101 97 105 97 113C97 118 103 122 112 122C121 122 127 118 127 113C127 105 121 101 117 100.5C119 98.5 121 96 121 92C121 88 118 84 112 84Z" fill="white"/>
  <!-- Chicken detail (green) -->
  <path d="M112 92C112 92 114 94.5 114 97C114 99.5 112 100.5 112 100.5C112 100.5 110 99.5 110 97C110 94.5 112 92 112 92Z" fill="#16a34a"/>

  <!-- Brand name -->
  <text x="160" y="116" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="34" font-weight="800" fill="#0f172a">MiAgroGestion</text>

  <!-- Main headline line 1 -->
  <text x="80" y="248" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="68" font-weight="800" fill="#0f172a">Controla tu granja</text>
  <!-- Main headline line 2 (green) -->
  <text x="80" y="326" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="68" font-weight="800" fill="#16a34a">desde el celular</text>

  <!-- Subheadline -->
  <text x="80" y="386" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="24" fill="#475569">Software para granjas de gallinas ponedoras en Perú y Latinoamérica</text>

  <!-- Feature pills -->
  <!-- Pill 1 -->
  <rect x="80" y="420" width="196" height="40" rx="20" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="178" y="445" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#15803d" text-anchor="middle">% Postura en tiempo real</text>
  <!-- Pill 2 -->
  <rect x="290" y="420" width="160" height="40" rx="20" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="370" y="445" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#15803d" text-anchor="middle">Control de ventas</text>
  <!-- Pill 3 -->
  <rect x="464" y="420" width="168" height="40" rx="20" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="548" y="445" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#15803d" text-anchor="middle">Alertas automáticas</text>

  <!-- CTA button -->
  <rect x="80" y="490" width="280" height="58" rx="29" fill="#16a34a"/>
  <text x="220" y="525" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">Prueba gratis 14 días</text>

  <!-- URL bottom right -->
  <text x="1120" y="598" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#94a3b8" text-anchor="end">miagrogesion.com</text>

  <!-- Green bottom bar -->
  <rect y="624" width="1200" height="6" fill="#16a34a"/>
</svg>
